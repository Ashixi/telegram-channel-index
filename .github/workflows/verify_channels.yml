name: Verify Channels List

on:
  pull_request:
    branches: [ main, master ] 

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run duplicate check
        run: python check_duplicates.py
